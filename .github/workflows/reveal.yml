name: blank

on:
  push:

jobs:
  progressive:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        taste: ["setting", "aid", "basin", "guideline", "punch"]
        keep: ["available", "critic", "ounce", "reaction"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java -jar uD
